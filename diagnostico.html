<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de gestión — LideraIA</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--carbon:#2A2D35;--coral:#C4705A;--coral-light:#D4917E;--coral-bg:#FDF5F2;--bg:#F7F6F3;--bg2:#F0EDEA;--surface:#FFF;--text:#2A2D35;--mid:#5A5D65;--light:#8A8D95;--border:#E0DEDA;--green:#5A8A6A;--green-bg:#E8F0EB;--amber:#C49A5A;--amber-bg:#F5F0E5}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);min-height:100vh;-webkit-font-smoothing:antialiased}

.header{padding:18px 24px;text-align:center}
.header a{font-family:'DM Serif Display',serif;font-size:17px;color:var(--carbon);text-decoration:none;letter-spacing:-.3px}
.header a span{color:var(--coral)}

.container{max-width:560px;margin:0 auto;padding:0 24px}
.container.wide{max-width:620px}

/* Screens */
.screen{display:none;opacity:0;transform:translateY(14px);transition:all .5s cubic-bezier(.22,1,.36,1)}
.screen.active{display:block}
.screen.visible{opacity:1;transform:translateY(0)}

/* Welcome */
.welcome-icon{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--coral),#D4885A);display:flex;align-items:center;justify-content:center;margin-bottom:26px;box-shadow:0 4px 16px rgba(196,112,90,.25)}
.welcome-icon svg{width:24px;height:24px}
h1{font-family:'DM Serif Display',serif;font-size:30px;color:var(--carbon);line-height:1.2;margin-bottom:14px;font-weight:400}
.intro{font-size:15.5px;color:var(--mid);line-height:1.7;margin-bottom:10px}
.intro:last-of-type{margin-bottom:32px}
.btn-primary{background:var(--coral);color:#fff;border:none;padding:14px 36px;border-radius:10px;font-size:16px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(196,112,90,.25);transition:all .25s}
.btn-primary:hover{background:var(--carbon);transform:translateY(-2px)}
.note{font-size:12px;color:var(--light);margin-top:14px}

/* Progress */
.progress-label{font-size:12.5px;color:var(--coral);font-weight:600;margin-bottom:6px}
.progress-track{height:3px;background:#EDE8E3;border-radius:4px;overflow:hidden;margin-bottom:26px}
.progress-fill{height:100%;background:var(--coral);border-radius:4px;transition:width .5s cubic-bezier(.22,1,.36,1)}

/* Question */
h2{font-family:'DM Serif Display',serif;font-size:21px;color:var(--carbon);line-height:1.35;font-weight:400;margin-bottom:22px}
.q-subtitle{font-size:13.5px;color:var(--light);font-style:italic;line-height:1.5;margin-top:-14px;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--surface);color:var(--carbon);border:2px solid var(--border);border-radius:10px;padding:13px 16px;text-align:left;font-size:14.5px;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.5;cursor:pointer;transition:all .2s}
.opt:hover{border-color:var(--coral);background:var(--coral-bg)}
.opt.selected{background:var(--carbon);color:#fff;border-color:var(--carbon);box-shadow:0 2px 8px rgba(42,45,53,.12)}
.q-nav{display:flex;justify-content:space-between;margin-top:28px}
.btn-back{background:none;border:none;color:var(--light);font-family:'Plus Jakarta Sans',sans-serif;font-size:13.5px;cursor:pointer}
.btn-next{background:var(--coral);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s}
.btn-next:disabled{background:#D9D0CA;opacity:.5;cursor:default}

/* Results */
.result-header{background:var(--carbon);border-radius:16px;padding:30px 26px 26px;margin-bottom:18px;position:relative;overflow:hidden}
.result-header .circle1{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;border:2px solid rgba(196,112,90,.12)}
.result-header .circle2{position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;border-radius:50%;border:2px solid rgba(255,255,255,.04)}
.result-header-inner{position:relative;z-index:1}
.result-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.tag{font-size:11px;color:var(--coral);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.fit-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.fit-alto{background:rgba(90,138,106,.15);color:#8BC8A0}
.fit-bajo{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}
.fit-dot{width:7px;height:7px;border-radius:50%}
.result-title{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;line-height:1.3;font-weight:400;margin-bottom:20px}

/* Maturity scale */
.scale{margin-bottom:4px}
.scale-track{position:relative;height:42px;margin-bottom:6px}
.scale-bg{position:absolute;top:15px;left:0;right:0;height:8px;border-radius:10px;background:linear-gradient(90deg,rgba(196,112,90,.15),rgba(196,154,90,.15),rgba(90,138,106,.15))}
.scale-fill{position:absolute;top:15px;left:0;height:8px;border-radius:10px;background:linear-gradient(90deg,var(--coral),var(--amber),var(--green));width:0;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.scale-marker{position:absolute;top:8px;left:0;transform:translateX(-50%);transition:left 1.2s cubic-bezier(.22,1,.36,1);z-index:2}
.scale-dot{width:22px;height:22px;border-radius:50%;background:var(--carbon);border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.scale-labels{display:flex;justify-content:space-between;font-size:10.5px;color:rgba(255,255,255,.4)}

/* Cards */
.card{background:var(--surface);border-radius:14px;padding:22px 20px;border:1px solid var(--border);margin-bottom:14px}
.card-dark{background:var(--carbon);border:none}
.card-coral{background:var(--coral-bg);border-left:3px solid var(--coral)}
.card-warm{background:#F8F6F3}
.card-honesty{background:#FFF9F0;border:1px solid #E8DDD0}
.section-label{font-size:12px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.body-text{font-size:14.5px;color:#404040;line-height:1.75}
.body-text+.body-text{margin-top:14px}

/* Dimension bars */
.dim{margin-bottom:16px}
.dim-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.dim-label{font-size:13px;font-weight:600;color:var(--carbon)}
.dim-level{font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px}
.dim-desc{font-size:11.5px;color:var(--light);margin-bottom:6px;line-height:1.4}
.dim-track{height:7px;background:#EDE8E3;border-radius:10px;overflow:hidden}
.dim-fill{height:100%;border-radius:10px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}

/* Hours card */
.hours-card{display:flex;align-items:center;gap:18px;padding:22px 24px}
.hours-circle{min-width:62px;height:62px;border-radius:50%;background:rgba(196,112,90,.12);display:flex;align-items:center;justify-content:center;flex-direction:column}
.hours-num{font-family:'DM Serif Display',serif;font-size:23px;color:var(--coral);line-height:1}
.hours-unit{font-size:9px;color:var(--coral-light);font-weight:600;margin-top:1px}
.hours-text{font-size:14px;color:#fff;line-height:1.5;font-weight:500}
.hours-sub{font-size:11.5px;color:rgba(255,255,255,.4);line-height:1.4;margin-top:3px}

/* Pain insight */
.pain-label{font-size:11px;color:var(--coral);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.pain-detail{font-size:14px;color:#5A5050;line-height:1.65;margin-top:8px}

/* Before/After */
.ba-grid{display:grid;grid-template-columns:1fr 1fr;border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px}
.ba-col{padding:18px 16px}
.ba-before{background:#F8F2EE;border-right:1px solid var(--border)}
.ba-after{background:#EFF5F0}
.ba-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.ba-tag-before{color:var(--coral)}
.ba-tag-after{color:var(--green)}
.ba-text{font-size:13px;line-height:1.6}
.ba-before .ba-text{color:#6B5E55}
.ba-after .ba-text{color:#3A5A45}
.ba-link{background:var(--surface);padding:11px 16px;border-top:1px solid var(--border)}
.ba-link a{font-size:12.5px;color:var(--coral);font-weight:600;text-decoration:none}
.ba-link a:hover{color:var(--carbon)}

/* Readiness */
.readiness{font-size:13.5px;color:var(--mid);line-height:1.6;font-style:italic}
.honesty{font-size:13.5px;color:#6B5E50;line-height:1.6}

/* CTA */
.cta-text{font-size:14.5px;color:var(--carbon);line-height:1.65;font-weight:500;margin-bottom:18px}
.alt-cta{font-size:13px;color:var(--light);margin-top:14px}

/* Inline form */
.inline-form{display:none;flex-direction:column;gap:10px}
.inline-form.open{display:flex}
.inline-form .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inline-form input,.inline-form textarea{width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--carbon);background:var(--surface);outline:none;transition:border-color .2s;box-sizing:border-box}
.inline-form input:focus,.inline-form textarea:focus{border-color:var(--coral)}
.inline-form textarea{resize:vertical}
.form-note{font-size:11px;color:var(--light);text-align:center;line-height:1.5}
.form-success{text-align:center;padding:24px 16px}
.form-success-icon{width:42px;height:42px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:18px;color:var(--green)}

/* Footer */
.diag-footer{text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);margin-bottom:20px}
.restart{background:none;border:none;color:var(--light);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;cursor:pointer;margin:20px auto 8px;display:block}

/* Responsive */
@media(max-width:600px){
h1{font-size:26px}
.result-title{font-size:21px}
.ba-grid{grid-template-columns:1fr}
.ba-before{border-right:none;border-bottom:1px solid var(--border)}
.inline-form .frow{grid-template-columns:1fr}
.result-meta{flex-direction:column}
}

/* Centered layout for welcome/questions */
.centered-layout{min-height:100vh;display:flex;flex-direction:column;justify-content:center}
.results-layout{padding-top:0;padding-bottom:40px}
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ══════════════════════════════════════════════════════════
   DATA
   ══════════════════════════════════════════════════════════ */
const Q=[
{id:1,dim:"info",text:"Cuando necesitas tomar una decisión importante sobre tu equipo o un proyecto, ¿de dónde sacas la información?",opts:[
{t:"La tengo en la cabeza o pregunto directamente a las personas",s:1},
{t:"Reviso correos, WhatsApps y archivos hasta encontrar lo que necesito",s:1},
{t:"Tengo planillas o reportes que consulto regularmente",s:3},
{t:"Tengo un sistema o dashboard donde la información está consolidada",s:4}]},
{id:2,dim:"info",text:"Si alguien de tu equipo te pide un resumen del estado de un proyecto, ¿cuánto te tomas en armar la respuesta?",opts:[
{t:"Puedo responder al momento porque tengo todo claro",s:4},
{t:"Necesito revisar algunos archivos, me tomo unos 15-30 minutos",s:3},
{t:"Tengo que juntar información de varias fuentes, me tomo más de una hora",s:1},
{t:"Depende del proyecto, a veces ni yo tengo el panorama completo",s:1}]},
{id:3,dim:"efficiency",text:"¿Cuánto tiempo a la semana dedicas a tareas necesarias pero repetitivas?",sub:"Reportes, seguimiento, coordinación, responder lo mismo varias veces.",opts:[
{t:"Menos de 2 horas",s:4,h:[.5,1]},
{t:"Entre 2 y 5 horas",s:3,h:[1,2]},
{t:"Entre 5 y 10 horas",s:2,h:[2,4]},
{t:"Más de 10 horas",s:1,h:[4,6]}]},
{id:4,tag:"pain",text:"¿Cuál de estas situaciones vives con más frecuencia?",sub:"Probablemente varias te suenan. Elige la que pesa más en tu semana.",opts:[
{t:"Paso más tiempo preparando información que tomando decisiones con ella",v:"visibility"},
{t:"Sé que hay datos útiles en algún lado pero no tengo tiempo de buscarlos",v:"access"},
{t:"Mi equipo depende mucho de mí para saber qué hacer y en qué orden",v:"dependency"},
{t:"Me cuesta comunicar la información de forma clara y rápida a quienes la necesitan",v:"communication"}]},
{id:5,dim:"tools",text:"Cuando tienes que preparar algo escrito (un informe, una propuesta, un correo importante), ¿cómo lo haces normalmente?",opts:[
{t:"Lo escribo desde cero cada vez",s:1},
{t:"Uso versiones anteriores como base y las adapto",s:2},
{t:"Uso alguna herramienta de IA como apoyo para el borrador",s:3},
{t:"Tengo un proceso armado que me facilita la tarea",s:4}]},
{id:6,dim:"efficiency",text:"¿Con qué frecuencia sientes que tu semana se te va en apagar incendios en vez de avanzar en lo importante?",opts:[
{t:"Casi nunca, tengo buen control de mi agenda",s:4},
{t:"A veces, pero logro equilibrar",s:3},
{t:"Frecuentemente, las urgencias me comen el tiempo",s:2},
{t:"Es mi día a día, casi no tengo espacio para lo estratégico",s:1}]},
{id:7,dim:"strategic",text:"Si pudieras recuperar 5 horas a la semana, ¿en qué las invertirías?",opts:[
{t:"Pensar estratégicamente sobre el futuro de mi área",s:3},
{t:"Dedicar más tiempo a mi equipo y su desarrollo",s:3},
{t:"Avanzar en proyectos que tengo postergados",s:3},
{t:"Llevo tanto tiempo en modo operativo que no lo he pensado",s:1}]},
{id:8,tag:"readiness",text:"¿Qué tan cómodo/a te sientes probando herramientas digitales nuevas?",opts:[
{t:"Me cuesta, prefiero lo que ya conozco",v:"low"},
{t:"Lo hago si alguien me guía o me lo explica",v:"guided"},
{t:"Pruebo cosas por mi cuenta cuando tengo tiempo",v:"autonomous"},
{t:"Me gusta explorar herramientas nuevas, lo hago seguido",v:"high"}]}
];

const DIM={
info:{l:"Estructura de información",d:"Qué tan accesible y organizada está la información que necesitas para decidir."},
efficiency:{l:"Eficiencia operativa",d:"Cuánto de tu semana se va en tareas repetitivas o en apagar incendios."},
tools:{l:"Herramientas de trabajo",d:"Qué tan avanzadas son las herramientas que usas hoy para gestionar."},
strategic:{l:"Espacio estratégico",d:"Cuánto espacio real tienes para pensar más allá de la operación diaria."}
};

const PAIN={
visibility:{l:"Visibilidad de información",dt:"Tu mayor oportunidad está en la visibilidad: que la información llegue a ti ya procesada en vez de tener que ir a buscarla. Hoy inviertes tiempo valioso en armar el panorama antes de poder actuar.",b:"Cada vez que necesitas saber el estado de algo, abres 4 archivos, 3 correos y le escribes a 2 personas. Armar un reporte semanal te toma más de una hora.",a:"Un dashboard actualizado te muestra el estado de todo en un vistazo. El reporte se genera solo. Tú decides qué hacer con la información, no la persigues.",p:"consolidación de información y dashboards de gestión"},
access:{l:"Acceso a datos",dt:"La información existe en tu organización, pero acceder a ella cuesta más tiempo del que vale. Ahí es donde la IA tiene impacto inmediato: traerte lo que necesitas sin que tengas que buscarlo.",b:"Sabes que en algún correo de hace tres semanas está el dato que necesitas. O en una planilla que alguien compartió. Encontrarlo te toma 30 minutos que no tienes.",a:"Una herramienta busca, consolida y te presenta la información relevante. Tú preguntas, ella responde con tus propios datos.",p:"herramientas de búsqueda y consolidación de información"},
dependency:{l:"Autonomía del equipo",dt:"Si tu equipo necesita preguntarte para saber qué hacer, una herramienta que les dé visibilidad directa libera tu tiempo y los hace más autónomos al mismo tiempo.",b:"Tu equipo te escribe para preguntar prioridades, estados, o qué hacer con un caso puntual. Eres el cuello de botella aunque no quieras serlo.",a:"Tu equipo consulta directamente el estado de los proyectos, las prioridades están visibles, y solo te escalan lo que realmente requiere tu criterio.",p:"herramientas de seguimiento y visibilidad para equipos"},
communication:{l:"Comunicación de información",dt:"Tu desafío no es de análisis, es de traducción: convertir lo que sabes en formatos que otros puedan usar sin depender de ti. Eso es exactamente lo que se puede sistematizar.",b:"Tienes la información en la cabeza pero armar una presentación, un informe o una actualización clara te consume tiempo que no está presupuestado.",a:"La información se transforma automáticamente en el formato que necesitas: resumen ejecutivo, reporte para el directorio, actualización para el equipo.",p:"automatización de reportes y propuestas"}
};

const READY={
low:"El programa es guiado paso a paso. No necesitas aprender por tu cuenta ni tener conocimiento técnico previo. Construimos juntos, a tu ritmo.",
guided:"El programa funciona exactamente así: te guío en cada paso, construimos juntos, y te llevas algo funcionando sin necesidad de descifrar nada solo/a.",
autonomous:"Como ya tienes el hábito de probar cosas nuevas, el programa se enfocaría menos en enseñarte herramientas y más en diseñar la solución correcta para tu contexto.",
high:"Tu curiosidad es una ventaja enorme. El programa canalizaría eso hacia una solución concreta, para que la exploración se traduzca en impacto real en tu gestión."
};

const PROF={
1:{tag:"Nivel inicial",title:"Tu experiencia lidera, pero tus herramientas no la acompañan",fit:"alto",
body:["Tienes años tomando buenas decisiones con información incompleta, dispersa o que te cuesta demasiado reunir. Eso habla de tu criterio, pero también de cuánta energía estás gastando en el proceso en vez de en la decisión misma.","La oportunidad más grande en tu caso no está en \"aprender IA\" como concepto, sino en conectar herramientas concretas con los problemas que ya resuelves todos los días."],
cta:"Este programa está diseñado para líderes en tu situación. En 4 sesiones construimos juntos una solución concreta que resuelve uno de estos problemas con tu información real, no con ejercicios genéricos."},
2:{tag:"Uso inicial de IA",title:"Usas IA, pero le estás sacando una fracción de lo que puede darte",fit:"alto",
body:["Ya diste un paso que muchos líderes en tu posición no han dado: probaste herramientas de IA y las incorporaste a parte de tu trabajo.","Pero hay una diferencia grande entre usar la IA como asistente puntual y usarla como parte de tu sistema de gestión. No es lo mismo pedirle que \"redacte un informe\" que tener una herramienta que toma tus datos operativos y te entrega el informe listo, cada semana, sin que lo pidas."],
cta:"El programa te ayudaría a dar el salto de usar IA para tareas sueltas a integrarla en tu gestión. Como ya tienes familiaridad con las herramientas, el foco estaría en diseñar soluciones con tu información real."},
3:{tag:"Alta carga operativa",title:"Estás en modo supervivencia, y eso es precisamente el problema",fit:"alto",
body:["Tu semana se parece más a una lista interminable de urgencias que a un plan. Eso no es un problema de organización personal: es un síntoma de que tu rol absorbe más operación de la que debería, y probablemente no tienes herramientas que te descarguen.","Hay una paradoja en tu situación: eres quien más se beneficiaría de automatizar y sistematizar, pero también quien menos tiempo tiene para hacerlo. La buena noticia es que en perfiles como el tuyo, los resultados suelen ser los más visibles."],
cta:"El programa dura un mes, con sesiones de 1,5 horas. Está pensado para personas con poco tiempo. No te voy a pedir que estudies ni que hagas tarea: construimos juntos en la sesión y te llevas algo funcionando.",
honesty:"Un punto importante: si tu agenda no te permite comprometerte con 4 sesiones en un mes, puede que este no sea el mejor momento. Eso es válido. Puedes guardar este resultado y retomarlo cuando tengas un espacio."},
4:{tag:"Nivel avanzado",title:"Tu gestión ya está en buen camino",fit:"bajo",
body:["Tu nivel de gestión y uso de herramientas es significativamente más alto que el de la mayoría de líderes en posiciones similares. Ya tienes estructura, usas tecnología de forma proactiva, y tu carga operativa parece estar bajo control.","Siendo directa: el programa LideraIA está diseñado para líderes que todavía no dieron ese salto, y probablemente no es donde mejor invertirías tu tiempo ahora mismo."],
cta:"Si te interesa explorar un punto específico, conversemos. Si no, me alegra saber que vas bien.",
altCTA:"Si conoces a alguien en tu red que está en una situación distinta, puedes compartirle este diagnóstico."}
};

/* ══════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════ */
let state={phase:"welcome",qi:0,answers:Array(8).fill(null),result:null};

/* ══════════════════════════════════════════════════════════
   SCORING
   ══════════════════════════════════════════════════════════ */
function score(){
const a=state.answers;
const dims={info:[],efficiency:[],tools:[],strategic:[]};
Q.forEach((q,i)=>{if(q.dim&&a[i]!==null)dims[q.dim].push(q.opts[a[i]].s)});
const dA={};Object.keys(dims).forEach(d=>{const arr=dims[d];dA[d]=arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:2});
let total=0;[0,1,2,4,5,6].forEach(i=>{if(a[i]!==null)total+=Q[i].opts[a[i]].s});
const pain=a[3]!==null?Q[3].opts[a[3]].v:"visibility";
const readiness=a[7]!==null?Q[7].opts[a[7]].v:"guided";
const hours=a[2]!==null?Q[2].opts[a[2]].h:[1,2];
const usesAI=a[4]===2;const q6=a[5],q7=a[6];
const surv=q6===3||(q6===2&&q7===3);
let pid;if(total>=19)pid=4;else if(surv)pid=3;else if(usesAI&&total>=10)pid=2;else pid=1;
const mat=Math.max(5,Math.min(95,Math.round(((total-6)/18)*100)));
return{pid,dA,pain,readiness,hours,mat};
}

function levelOf(v){
if(v<=1.5)return{l:"Inicial",c:"var(--coral)",bg:"var(--coral-bg)"};
if(v<=2.5)return{l:"En desarrollo",c:"var(--amber)",bg:"var(--amber-bg)"};
if(v<=3.2)return{l:"Intermedio",c:"var(--green)",bg:"var(--green-bg)"};
return{l:"Avanzado",c:"#3A7A5A",bg:"#DFF0E5"};
}

/* ══════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════ */
function render(){
const app=document.getElementById("app");
if(state.phase==="welcome")renderWelcome(app);
else if(state.phase==="questions")renderQuestion(app);
else if(state.phase==="result")renderResult(app);
}

function show(el,delay){
setTimeout(()=>{el.classList.add("visible")},delay||50);
}

function renderWelcome(app){
app.innerHTML=`
<div class="centered-layout">
<div class="header"><a href="https://lideraia.cl">Lidera<span>IA</span></a></div>
<div class="container">
<div id="welcome-screen" class="screen active">
<div class="welcome-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
<h1>Diagnóstico: ¿cómo gestionas hoy tu trabajo?</h1>
<p class="intro">8 preguntas sobre tu día a día como líder. Sin tecnicismos, sin respuestas correctas.</p>
<p class="intro">Al final recibirás tu perfil de gestión, un desglose por dimensión, y una estimación concreta de cuánto tiempo podrías recuperar cada semana. Toma menos de 3 minutos.</p>
<button class="btn-primary" onclick="startQuiz()">Comenzar diagnóstico</button>
<p class="note">No recopilamos datos. Tu resultado es solo para ti.</p>
</div>
</div>
</div>`;
show(document.getElementById("welcome-screen"));
}

function renderQuestion(app){
const q=Q[state.qi];const sel=state.answers[state.qi];
app.innerHTML=`
<div class="centered-layout">
<div class="header"><a href="https://lideraia.cl">Lidera<span>IA</span></a></div>
<div class="container">
<div id="q-screen" class="screen active">
<p class="progress-label">Pregunta ${state.qi+1} de ${Q.length}</p>
<div class="progress-track"><div class="progress-fill" style="width:${((state.qi+1)/Q.length)*100}%"></div></div>
<h2>${q.text}</h2>
${q.sub?`<p class="q-subtitle">${q.sub}</p>`:""}
<div class="options">
${q.opts.map((o,i)=>`<button class="opt${sel===i?" selected":""}" onclick="selectOpt(${i})">${o.t}</button>`).join("")}
</div>
<div class="q-nav">
<button class="btn-back" onclick="goBack()" style="visibility:${state.qi===0?"hidden":"visible"}">← Anterior</button>
<button class="btn-next" onclick="goNext()"${sel===null?" disabled":""}>${state.qi===Q.length-1?"Ver mi resultado":"Siguiente →"}</button>
</div>
</div>
</div>
</div>`;
show(document.getElementById("q-screen"));
}

function renderResult(app){
const r=state.result;const p=PROF[r.pid];const pd=PAIN[r.pain];const isAdv=r.pid===4;
const fitH=p.fit==="alto";

let html=`
<div class="results-layout">
<div class="header"><a href="https://lideraia.cl">Lidera<span>IA</span></a></div>
<div class="container wide">
<div id="result-screen" class="screen active">

<!-- Header -->
<div class="result-header">
<div class="circle1"></div><div class="circle2"></div>
<div class="result-header-inner">
<div class="result-meta">
<span class="tag">${p.tag}</span>
<div class="fit-badge ${fitH?"fit-alto":"fit-bajo"}"><div class="fit-dot" style="background:${fitH?"var(--green)":"var(--light)"}"></div>${fitH?"Alta compatibilidad con el programa":"El programa podría no ser lo que necesitas ahora"}</div>
</div>
<div class="result-title">${p.title}</div>
<div class="scale">
<div class="scale-track">
<div class="scale-bg"></div>
<div class="scale-fill" id="scale-fill"></div>
<div class="scale-marker" id="scale-marker"><div class="scale-dot"></div></div>
</div>
<div class="scale-labels"><span>Gestión manual</span><span>Gestión potenciada con IA</span></div>
</div>
</div>
</div>

<!-- Dimensions -->
<div class="card">
<div class="section-label">Tu perfil por dimensión</div>
${["info","efficiency","tools","strategic"].map((d,i)=>{
const v=r.dA[d];const lv=levelOf(v);
return`<div class="dim"><div class="dim-head"><span class="dim-label">${DIM[d].l}</span><span class="dim-level" style="color:${lv.c};background:${lv.bg}">${lv.l}</span></div><p class="dim-desc">${DIM[d].d}</p><div class="dim-track"><div class="dim-fill" id="dim-${d}" style="background:linear-gradient(90deg,${lv.c}BB,${lv.c})"></div></div></div>`;
}).join("")}
</div>

<!-- Hours -->
<div class="card card-dark hours-card">
<div class="hours-circle"><span class="hours-num">${r.hours[0]}-${r.hours[1]}</span><span class="hours-unit">hrs/sem</span></div>
<div><p class="hours-text">Tiempo estimado que podrías recuperar cada semana</p><p class="hours-sub">Estimación conservadora: reducción del 40% en tareas repetitivas, basada en tus respuestas.</p></div>
</div>

<!-- Body -->
<div class="card">
${p.body.map(t=>`<p class="body-text">${t}</p>`).join("")}
</div>`;

if(!isAdv){
html+=`
<!-- Pain -->
<div class="card card-coral">
<span class="pain-label">Tu oportunidad principal: ${pd.l}</span>
<p class="pain-detail">${pd.dt}</p>
</div>

<!-- Before/After -->
<div class="ba-grid">
<div class="ba-col ba-before"><div class="ba-tag ba-tag-before">Hoy</div><p class="ba-text">${pd.b}</p></div>
<div class="ba-col ba-after"><div class="ba-tag ba-tag-after">Después del programa</div><p class="ba-text">${pd.a}</p></div>
</div>
<div class="card" style="margin-top:-14px;border-top-left-radius:0;border-top-right-radius:0"><a href="https://www.lideraia.cl/portafolio.html" style="font-size:12.5px;color:var(--coral);font-weight:600;text-decoration:none">Ver ejemplos reales de ${pd.p} →</a></div>

<!-- Readiness -->
<div class="card card-warm"><p class="readiness">${READY[r.readiness]}</p></div>`;
}

if(p.honesty){
html+=`<div class="card card-honesty"><p class="honesty">${p.honesty}</p></div>`;
}

html+=`
<!-- CTA -->
<div class="card">
<p class="cta-text">${p.cta}</p>
<div id="cta-area">
<button class="btn-primary" onclick="showForm()">${isAdv?"Conversemos si te interesa":"Agendar una conversación →"}</button>
${p.altCTA?`<p class="alt-cta">${p.altCTA}</p>`:""}
</div>
<div class="inline-form" id="inline-form">
<div class="frow">
<input type="text" id="f-nombre" placeholder="Nombre completo *">
<input type="email" id="f-email" placeholder="Correo electrónico *">
</div>
<input type="text" id="f-cargo" placeholder="Cargo actual *">
<textarea id="f-mensaje" rows="3" placeholder="¿Algo que quieras contarme? (opcional)"></textarea>
<button class="btn-primary" id="f-btn" onclick="submitForm()">Agendar conversación →</button>
<p class="form-note">Tus datos se usan exclusivamente para coordinar una conversación. No serán compartidos con terceros.</p>
</div>
<div id="form-success" class="form-success" style="display:none">
<div class="form-success-icon">✓</div>
<p style="font-family:'DM Serif Display',serif;font-size:18px;color:var(--carbon);margin-bottom:6px">Mensaje enviado</p>
<p style="font-size:13px;color:var(--light)">Te respondo dentro de 48 horas.</p>
</div>
</div>

<button class="restart" onclick="restart()">Volver a hacer el diagnóstico</button>

<div class="diag-footer">
<a href="https://lideraia.cl" style="font-family:'DM Serif Display',serif;font-size:16px;color:var(--carbon);text-decoration:none">Lidera<span style="color:var(--coral)">IA</span></a>
<p style="font-size:11.5px;color:var(--light);margin-top:4px">natalia@lideraia.cl</p>
</div>

</div><!-- screen -->
</div><!-- container -->
</div><!-- layout -->`;

app.innerHTML=html;
show(document.getElementById("result-screen"),100);

// Animate scale and bars
setTimeout(()=>{
const sf=document.getElementById("scale-fill");
const sm=document.getElementById("scale-marker");
if(sf)sf.style.width=r.mat+"%";
if(sm)sm.style.left=r.mat+"%";
["info","efficiency","tools","strategic"].forEach((d,i)=>{
setTimeout(()=>{
const el=document.getElementById("dim-"+d);
if(el)el.style.width=(r.dA[d]/4*100)+"%";
},200+i*200);
});
},300);
}

/* ══════════════════════════════════════════════════════════
   ACTIONS
   ══════════════════════════════════════════════════════════ */
function startQuiz(){state.phase="questions";state.qi=0;render();window.scrollTo(0,0)}
function selectOpt(i){state.answers[state.qi]=i;render()}
function goNext(){
if(state.answers[state.qi]===null)return;
if(state.qi<Q.length-1){state.qi++;render();window.scrollTo(0,0)}
else{state.result=score();state.phase="result";render();window.scrollTo(0,0)}
}
function goBack(){
if(state.qi>0){state.qi--;render();window.scrollTo(0,0)}
else{state.phase="welcome";render();window.scrollTo(0,0)}
}
function restart(){state={phase:"welcome",qi:0,answers:Array(8).fill(null),result:null};render();window.scrollTo(0,0)}

function showForm(){
document.getElementById("cta-area").style.display="none";
document.getElementById("inline-form").classList.add("open");
}

function submitForm(){
const n=document.getElementById("f-nombre").value;
const e=document.getElementById("f-email").value;
const c=document.getElementById("f-cargo").value;
const m=document.getElementById("f-mensaje").value;
if(!n||!e.includes("@")||!c)return;
const btn=document.getElementById("f-btn");
btn.textContent="Enviando...";btn.disabled=true;
fetch("https://formspree.io/f/xkokykwe",{
method:"POST",headers:{"Content-Type":"application/json",Accept:"application/json"},
body:JSON.stringify({nombre:n,email:e,cargo:c,mensaje:m,origen:"diagnostico"})
}).then(r=>{
if(r.ok){
document.getElementById("inline-form").style.display="none";
document.getElementById("form-success").style.display="block";
}else{btn.textContent="Error, intenta de nuevo";btn.disabled=false}
}).catch(()=>{btn.textContent="Error, intenta de nuevo";btn.disabled=false});
}

// Init
render();
</script>
</body>
</html>
